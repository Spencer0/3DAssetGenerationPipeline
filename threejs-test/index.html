<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Katamari Tools</title>
    <style>
      html, body { margin: 0; height: 100%; background: #f0efe9; font-family: system-ui, sans-serif; }
      .wrap { height: 100%; display: grid; place-items: center; }
      .card { background: white; border: 1px solid #ddd; padding: 24px 28px; border-radius: 8px; text-align: center; }
      .title { font-size: 18px; margin: 0 0 12px; }
      .btns { display: flex; gap: 12px; justify-content: center; }
      a.btn { display: inline-block; padding: 10px 14px; background: #222; color: #fff; text-decoration: none; border-radius: 6px; font-size: 13px; }
      a.btn.secondary { background: #555; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1 class="title">Katamari Tools</h1>
        <div class="btns">
          <a class="btn" href="./viewer.html">Open Viewer</a>
          <a class="btn secondary" href="./editor.html">Open Editor</a>
          <a class="btn secondary" href="./simulate.html">Open Simulator</a>
        </div>
      </div>
    </div>
  </body>
</html>
